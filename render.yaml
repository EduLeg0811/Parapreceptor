services:
  - type: web
    name: parapreceptor-backend
    runtime: python
    plan: starter
    rootDir: BACKEND
    buildCommand: pip install -r requirements.txt && python backend/python/build_lexical_index.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SERVER_PORT
        value: 8787
      - key: OPENAI_API_KEY
        sync: false
      - key: PDF2DOCX_PYTHON_CMD
        value: python
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: parapreceptor-frontend
    runtime: static
    rootDir: FRONTEND
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_OPENAI_VECTOR_STORES
        value: vs_6912908250e4819197e23fe725e04fae
      - key: VITE_OPENAI_VECTOR_STORE_LO
        value: vs_698be4e07c748191b834905ebc7a7da3
      - key: VITE_OPENAI_VECTOR_STORE_TRANSLATE_RAG
        value: vs_69931da436e48191b43453e845e63bd3
      - key: VITE_OPENAI_VECTOR_STORE_EDUNOTES
        value: vs_68f195fdeda08191815ec795ba1f57ba
      - key: VITE_OPENAI_VECTOR_STORE_ECWV
        value: vs_699d09de9ca48191b63fbbd4d195a696

